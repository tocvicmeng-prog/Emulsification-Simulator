name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs when a newer commit lands on the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick:
    name: Quick (lint + types + fast tests)
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install package + dev/ui extras
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ui]"
          pip install ruff mypy

      - name: Ruff lint
        shell: bash
        run: ruff check src tests

      - name: Mypy type check (regression baseline 32)
        shell: bash
        # v9.1.1 issue #5 burned mypy down from 90 -> 32 errors. CI enforces
        # the baseline as a regression cap: any PR that ADDS errors fails
        # this step. As fixes land in follow-up PRs, lower MYPY_MAX. Once the
        # count reaches single digits, drop the cap and require zero.
        run: |
          MYPY_MAX=32
          mypy src/emulsim --ignore-missing-imports --no-incremental | tee mypy.log || true
          n=$(grep -cE "^[^[:space:]].*: error:" mypy.log || echo 0)
          echo "mypy errors: $n (cap: $MYPY_MAX)"
          if [ "$n" -gt "$MYPY_MAX" ]; then
            echo "::error::mypy regression: $n errors exceeds baseline cap of $MYPY_MAX"
            exit 1
          fi

      - name: Pytest (not slow)
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
        # torch is only in [optimization]; skip the optimization tests here.
        # tests/test_optimization_smoke.py is the paired gate for [optimization]
        # (anchors ADR-002) but needs torch — run it in a dedicated job later.
        run: |
          pytest -m "not slow" --timeout=60 -p no:cacheprovider \
            --ignore=tests/test_optimization.py \
            --ignore=tests/test_inverse_design_engine.py \
            --ignore=tests/test_inverse_design_objectives.py \
            --ignore=tests/test_f4b_cvar.py \
            --ignore=tests/test_optimization_smoke.py

  smoke:
    name: Smoke gate (Py 3.12, dev+ui)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev + ui (matches installer)
        shell: bash
        # The installer ships [ui], and emulsim.visualization imports plotly
        # at __init__ time, so any test that touches the visualization package
        # for collection requires [ui]. Skip [optimization] here — that stack
        # is gated by tests/test_optimization_smoke.py + ADR-002.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ui]"
      - name: Smoke tests
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
        run: |
          pytest -m smoke --timeout=60 -p no:cacheprovider \
            --ignore=tests/test_optimization.py \
            --ignore=tests/test_inverse_design_engine.py \
            --ignore=tests/test_inverse_design_objectives.py \
            --ignore=tests/test_f4b_cvar.py \
            --ignore=tests/test_optimization_smoke.py

  installer-smoke:
    name: Installer build + silent install (Py 3.12)
    runs-on: windows-latest
    timeout-minutes: 15
    # Architect M2 + risk R1: installer regressions caused the v8.3.5/6/7 +
    # v9.0 hotfix cascade. v9.1.1 #6 promotes this from wheel-build-only to:
    #   1. Build the actual .exe via Inno Setup (catches .iss + script defects)
    #   2. Silently install to a temp directory (catches .bat parser, CRLF,
    #      Access Denied, file-permission regressions)
    #   3. Inspect the install tree for required files (catches "looks fine
    #      but missing a launcher" regressions)
    # NOT yet covered: launching the UI process and asserting browser-open.
    # That requires a Streamlit headless launcher and is left for a follow-up.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Inno Setup
        shell: pwsh
        # windows-latest images currently ship Inno Setup 6 at the standard
        # location, but install via Chocolatey defensively in case the image
        # changes. choco is pre-installed on windows-latest.
        run: |
          if (-not (Test-Path "C:\Program Files (x86)\Inno Setup 6\ISCC.exe")) {
            choco install innosetup --no-progress -y
          }
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /? | Select-Object -First 1
      - name: Build the .exe installer
        shell: cmd
        run: installer\build_installer.bat
      - name: List release output
        shell: bash
        run: ls -la release/
      - name: Silent install to temp dir
        shell: pwsh
        # /SILENT runs without GUI; /SUPPRESSMSGBOXES auto-answers prompts.
        # /DIR overrides the user-pick install location. /LOG captures the
        # install log so any failure is post-mortem-debuggable in CI logs.
        run: |
          $exe = Get-ChildItem release\EmulSim-*-Setup.exe | Select-Object -First 1
          if (-not $exe) { throw "No installer .exe produced" }
          $installDir = "$env:RUNNER_TEMP\emulsim-install"
          $logFile = "$env:RUNNER_TEMP\install.log"
          Write-Host "Installing $($exe.Name) to $installDir ..."
          $proc = Start-Process -FilePath $exe.FullName `
            -ArgumentList "/SILENT","/SUPPRESSMSGBOXES","/DIR=$installDir","/LOG=$logFile" `
            -PassThru -Wait
          Write-Host "Installer exit code: $($proc.ExitCode)"
          if ($proc.ExitCode -ne 0) {
            Write-Host "--- Install log ---"
            if (Test-Path $logFile) { Get-Content $logFile }
            throw "Silent install failed with code $($proc.ExitCode)"
          }
      - name: Verify install tree
        shell: pwsh
        run: |
          $installDir = "$env:RUNNER_TEMP\emulsim-install"
          $required = @(
            "install.bat", "launch_ui.bat", "launch_cli.bat", "uninstall.bat",
            "README.txt", "LICENSE.txt"
          )
          $missing = @()
          foreach ($f in $required) {
            $p = Join-Path $installDir $f
            if (-not (Test-Path $p)) { $missing += $f } else { Write-Host "OK $f" }
          }
          if ($missing.Count -gt 0) { throw "Missing files: $($missing -join ', ')" }
          # Wheel must be present for the per-user install step
          $wheel = Get-ChildItem (Join-Path $installDir "wheels") -Filter "emulsim-*.whl"
          if (-not $wheel) { throw "No wheel found in install tree" }
          Write-Host "Found wheel: $($wheel.Name)"
      - name: Verify wheel installs cleanly (legacy gate)
        shell: bash
        run: |
          python -m venv .check_venv
          .check_venv/Scripts/python -m pip install --upgrade pip
          .check_venv/Scripts/python -m pip install dist/*.whl
          .check_venv/Scripts/python -c "import emulsim; print('emulsim', emulsim.__version__)"
