[simulation]
run_id = "default_run"
notes = "Baseline simulation with default parameters"

[emulsification]
rpm = 10000
t_emulsification = 300.0  # [s] (5 min — allows PBE to reach steady state for viscous systems)

[emulsification.mixer]
rotor_diameter = 0.025    # [m] (25 mm rotor)
stator_diameter = 0.026   # [m]
gap_width = 0.0005        # [m] (0.5 mm gap)
tank_volume = 0.0005      # [m³] (500 mL)
power_number = 1.5
dissipation_ratio = 50.0

[formulation]
c_agarose = 42.0          # [kg/m³] (4.2% w/v for 7:3 ratio with total 6%)
c_chitosan = 18.0          # [kg/m³] (1.8% w/v)
c_span80 = 20.0            # [kg/m³] (~2% w/v)
c_genipin = 10.0           # [mol/m³] (~10 mM, stoichiometric for target p≈0.20)
T_oil = 363.15             # [K] (90°C)
cooling_rate = 0.167        # [K/s] (~10°C/min)
T_crosslink = 310.15       # [K] (37°C)
t_crosslink = 86400.0      # [s] (24 hours)
phi_d = 0.05               # [-] dispersed phase volume fraction

[solver.level1]
n_bins = 20
d_min = 1e-6              # [m]
d_max = 500e-6            # [m]
rtol = 1e-6
atol = 1e-8
t_max = 600.0             # [s] absolute ceiling for adaptive extensions
conv_tol = 0.01           # [-] relative d32 variation for convergence
max_extensions = 2        # [-] max number of half-interval extensions

[solver.level2]
n_r = 1000
n_grid = 128              # 2D grid side length (N×N)
dt_initial = 1e-4         # [s]
dt_max = 1.0              # [s]
arrest_exponent = 2.5

[solver.level3]
method = "Radau"
rtol = 1e-8
atol = 1e-10

[optimization]
n_initial = 20
max_iterations = 200
convergence_tol = 0.01
